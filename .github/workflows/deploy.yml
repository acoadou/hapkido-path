name: Deploy to GitHub Pages

on:
  # Trigger the workflow every time changes are pushed to the main branch.
  push:
    branches: [main]

  # Allow the workflow to be run manually from the Actions tab.
  workflow_dispatch:

# Allow GitHub Pages to read the repository, write Pages data, and verify the deployment.
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v6

      - name: Install, build, and upload your site
        uses: withastro/action@v6
        # with:
        #   path: . # The root location of the Astro project inside this repository.
        #   node-version: 24 # Optional; withastro/action defaults to a supported Node version.
        #   package-manager: npm # Optional; auto-detected when a lockfile is present.

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
